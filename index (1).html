<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Matematika</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Setup Modal -->
    <div id="setup-modal" class="modal active">
        <div class="modal-content">
            <h1>Ular Tangga Matematika 🎲</h1>
            <div class="setup-group">
                <label for="player-count">Jumlah Pemain (1-4):</label>
                <select id="player-count">
                    <option value="1">1 Pemain</option>
                    <option value="2">2 Pemain</option>
                    <option value="3">3 Pemain</option>
                    <option value="4" selected>4 Pemain</option>
                </select>
            </div>
            <div id="player-inputs">
                <!-- Inputs generated by JS -->
            </div>
            <button id="start-btn" class="btn primary">Mulai Permainan</button>
        </div>
    </div>

    <!-- Math Question Modal -->
    <div id="math-modal" class="modal">
        <div class="modal-content math-theme">
            <h2>Jawab Pertanyaan! 🧮</h2>
            <p id="math-question" class="question-text">5 + 3 = ?</p>
            <input type="number" id="math-answer" placeholder="Jawaban kamu..." autocomplete="off">
            <p id="math-feedback" class="feedback-text"></p>
            <p id="math-attempts" class="attempts-text">Sisa percobaan: 2</p>
            <button id="submit-answer-btn" class="btn primary">Jawab</button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-ui" class="hidden">
        <header>
            <h1>Ular Tangga Matematika</h1>
            <button id="reset-btn" class="btn danger">Reset Game</button>
        </header>

        <main class="game-container">
            <div class="board-wrapper">
                <div id="board" class="board">
                    <!-- 100 cells generated by JS -->
                </div>
            </div>

            <aside class="side-panel">
                <div class="panel-card current-turn-card">
                    <h2>Giliran:</h2>
                    <p id="current-player-name" class="highlight-text">Memuat...</p>
                </div>

                <div class="panel-card dice-card">
                    <div id="dice-visual" class="dice">
                        <div class="dot center"></div>
                    </div>
                    <button id="roll-btn" class="btn action">Kocok Dadu 🎲</button>
                    <p id="dice-result-text" class="result-text"></p>
                </div>

                <div class="panel-card players-card">
                    <h3>Daftar Pemain</h3>
                    <ul id="players-list">
                        <!-- Player list generated by JS -->
                    </ul>
                </div>
            </aside>
        </main>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="modal">
        <div class="modal-content success-theme">
            <h1>🏆 Selamat! 🏆</h1>
            <h2 id="winner-name">Player 1 Menang!</h2>
            <button id="play-again-btn" class="btn primary">Main Lagi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
