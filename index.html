<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Matematika</title>
    <style>
        :root {
            --p1-color: #2ecc71; /* Hijau */
            --p2-color: #f1c40f; /* Kuning */
            --p3-color: #e74c3c; /* Merah */
            --p4-color: #3498db; /* Biru */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-align: center;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        /* Papan Board 5x5 (25 Kotak agar pas di HP) */
        #board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            width: 100%;
            aspect-ratio: 1;
            background-color: #fff;
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .cell {
            border: 1px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            font-weight: bold;
            position: relative;
            background-color: #fff;
            font-size: 0.9rem;
        }

        /* Variasi warna kotak */
        .cell:nth-child(even) { background-color: #f9f9f9; }
        .cell.snakes { background-color: #ffdddd; }
        .cell.ladders { background-color: #ddffdd; }

        .token-container {
            display: flex;
            gap: 2px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 15px;
        }

        .token {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #000;
        }

        .p1 { background-color: var(--p1-color); }
        .p2 { background-color: var(--p2-color); }
        .p3 { background-color: var(--p3-color); }
        .p4 { background-color: var(--p4-color); }

        /* Kontrol Game */
        .controls {
            width: 100%;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .status-box {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            padding: 8px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #34495e;
            color: white;
            margin: 5px;
            transition: background 0.2s;
        }

        button:hover { background-color: #2c3e50; }
        #btn-reset { background-color: #95a5a6; }
        #btn-reset:hover { background-color: #7f8c8d; }

        /* Area Matematika */
        .math-section {
            margin-top: 15px;
            padding: 10px;
            border: 2px dashed #bdc3c7;
            border-radius: 5px;
            display: none;
        }

        #math-question {
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #answer-input {
            width: 80px;
            padding: 8px;
            font-size: 1rem;
            text-align: center;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h1>Ular Tangga Matematika</h1>
    
    <div class="game-container">
        <div id="board"></div>

        <div class="controls">
            <div id="status" class="status-box p1">Giliran: Player 1 (Hijau)</div>
            <div id="dice-result" style="margin-bottom: 10px; font-weight: bold;">Dadu: -</div>
            
            <button id="btn-roll" onclick="rollDice()">Kocok Dadu</button>
            <button id="btn-reset" onclick="resetGame()">Reset Game</button>

            <div id="math-box" class="math-section">
                <div id="math-question">1 + 1 = ?</div>
                <input type="number" id="answer-input" placeholder="Hasil">
                <button onclick="checkAnswer()">Jawab</button>
                <div id="chances-left" style="margin-top: 5px; color: #7f8c8d; font-size: 0.9rem;">Sisa percobaan: 3</div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Papan (5x5, Total 25 Kotak agar compact di mobile)
        const BOARD_SIZE = 25;
        
        // Fitur Ular & Tangga (Kunci: dari -> ke)
        const ladders = { 3: 11, 8: 14, 15: 22 };
        const snakes = { 12: 4, 17: 7, 23: 13 };

        // Data Pemain
        let players = {
            1: { pos: 1, color: 'p1', name: 'Player 1 (Hijau)' },
            2: { pos: 1, color: 'p2', name: 'Player 2 (Kuning)' },
            3: { pos: 1, color: 'p3', name: 'Player 3 (Merah)' },
            4: { pos: 1, color: 'p4', name: 'Player 4 (Biru)' }
        };

        let currentPlayer = 1;
        let currentDice = 0;
        let currentAnswer = 0;
        let attemptsLeft = 3;
        let pendingMove = false; // Mengunci kocok dadu saat menjawab matematika

        // Inisialisasi Papan Game saat Load
        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // Generate nomor ular tangga secara meliuk (boustrophedon)
            let cellsArray = [];
            for (let row = 4; row >= 0; row--) {
                let rowCells = [];
                for (let col = 0; col < 5; col++) {
                    let id = row * 5 + (row % 2 === 0 ? col + 1 : 5 - col);
                    rowCells.push(id);
                }
                cellsArray.push(...rowCells);
            }

            // Render ke HTML
            cellsArray.forEach(id => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${id}`;
                
                // Beri penanda teks jika ada ular/tangga
                let specialText = '';
                if (ladders[id]) { cell.classList.add('ladders'); specialText = `▲ T${ladders[id]}`; }
                if (snakes[id]) { cell.classList.add('snakes'); specialText = `▼ U${snakes[id]}`; }

                cell.innerHTML = `<div>${id} <span style="font-size:0.7rem; font-weight:normal;">${specialText}</span></div><div class="token-container" id="tokens-${id}"></div>`;
                board.appendChild(cell);
            });
            updateTokens();
        }

        // Update Posisi Pion Pemain di Papan
        function updateTokens() {
            // Bersihkan semua kontainer pion
            for (let i = 1; i <= BOARD_SIZE; i++) {
                document.getElementById(`tokens-${i}`).innerHTML = '';
            }
            // Taruh pion sesuai posisi player
            for (let p in players) {
                const token = document.createElement('div');
                token.className = `token ${players[p].color}`;
                document.getElementById(`tokens-${players[p].pos}`).appendChild(token);
            }
        }

        // Logika Kocok Dadu
        function rollDice() {
            if (pendingMove) return alert("Selesaikan pertanyaan matematika terlebih dahulu!");

            currentDice = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = `Dadu: ${currentDice}`;
            
            // Siapkan tantangan matematika sebelum melangkah
            generateMathQuestion();
        }

        // Membuat Soal Matematika Acak (+, -, *, /)
        function generateMathQuestion() {
            const ops = ['+', '-', '*', '/'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let num1, num2;

            if (op === '+') {
                num1 = Math.floor(Math.random() * 30) + 5;
                num2 = Math.floor(Math.random() * 30) + 5;
                currentAnswer = num1 + num2;
            } else if (op === '-') {
                num1 = Math.floor(Math.random() * 30) + 15;
                num2 = Math.floor(Math.random() * 14) + 1;
                currentAnswer = num1 - num2;
            } else if (op === '*') {
                num1 = Math.floor(Math.random() * 9) + 2;
                num2 = Math.floor(Math.random() * 9) + 2;
                currentAnswer = num1 * num2;
            } else if (op === '/') {
                num2 = Math.floor(Math.random() * 8) + 2;
                currentAnswer = Math.floor(Math.random() * 9) + 2;
                num1 = num2 * currentAnswer; // Memastikan hasil bagi bilangan bulat
            }

            document.getElementById('math-question').innerText = `${num1} ${op === '*' ? 'x' : op === '/' ? ':' : op} ${num2} = ?`;
            document.getElementById('answer-input').value = '';
            attemptsLeft = 3;
            document.getElementById('chances-left').innerText = `Sisa percobaan: ${attemptsLeft}`;
            
            document.getElementById('math-box').style.display = 'block';
            pendingMove = true;
        }

        // Validasi Jawaban Pemain
        function checkAnswer() {
            const playerInput = parseInt(document.getElementById('answer-input').value);
            
            if (isNaN(playerInput)) {
                alert("Masukkan angka hasil hitungan!");
                return;
            }

            if (playerInput === currentAnswer) {
                alert("Jawaban Benar! Anda berhak maju.");
                movePlayer();
            } else {
                attemptsLeft--;
                if (attemptsLeft > 0) {
                    alert(`Jawaban Salah! Coba lagi.`);
                    document.getElementById('chances-left').innerText = `Sisa percobaan: ${attemptsLeft}`;
                } else {
                    alert(`Kesempatan habis! Jawaban yang benar adalah ${currentAnswer}. Anda tidak bergerak giliran berganti.`);
                    closeMathSection();
                    switchTurn();
                }
            }
        }

        // Eksekusi Perpindahan Posisi Pemain
        function movePlayer() {
            let p = players[currentPlayer];
            let targetPos = p.pos + currentDice;

            if (targetPos <= BOARD_SIZE) {
                p.pos = targetPos;
                
                // Cek Ular atau Tangga
                if (ladders[p.pos]) {
                    alert(`MANTAP! ${p.name} naik tangga dari ${p.pos} ke ${ladders[p.pos]}`);
                    p.pos = ladders[p.pos];
                } else if (snakes[p.pos]) {
                    alert(`OH TIDAK! ${p.name} digigit ular dari ${p.pos} turun ke ${snakes[p.pos]}`);
                    p.pos = snakes[p.pos];
                }
            } else {
                alert(`Angka dadu terlalu besar untuk ${p.name} mencapai kotak ${BOARD_SIZE}.`);
            }

            updateTokens();
            closeMathSection();

            // Cek kondisi menang
            if (p.pos === BOARD_SIZE) {
                alert(`SELAMAT! ${p.name} MEMENANGKAN PERMAINAN!`);
                resetGame();
                return;
            }

            switchTurn();
        }

        function closeMathSection() {
            document.getElementById('math-box').style.display = 'none';
            pendingMove = false;
        }

        // Pergantian Giliran dengan Update Warna Sesuai Aturan
        function switchTurn() {
            currentPlayer = currentPlayer === 4 ? 1 : currentPlayer + 1;
            const statusBox = document.getElementById('status');
            
            // Reset kelas warna
            statusBox.className = 'status-box ' + players[currentPlayer].color;
            statusBox.innerText = `Giliran: ${players[currentPlayer].name}`;
        }

        // Reset Game ke Keadaan Semula
        function resetGame() {
            for (let p in players) {
                players[p].pos = 1;
            }
            currentPlayer = 1;
            currentDice = 0;
            pendingMove = false;
            document.getElementById('dice-result').innerText = `Dadu: -`;
            document.getElementById('status').className = 'status-box p1';
            document.getElementById('status').innerText = `Giliran: Player 1 (Hijau)`;
            closeMathSection();
            createBoard();
        }

        // Jalankan saat startup
        createBoard();
    </script>
</body>
</html>
